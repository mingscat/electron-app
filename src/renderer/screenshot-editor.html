<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>截图编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* 画布容器 */
    .canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      cursor: crosshair;
      overflow: hidden;
    }

    /* 背景画布 */
    #bg-canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 绘制画布 */
    #draw-canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 工具栏 */
    .toolbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(30, 30, 30, 0.95);
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 1000;
    }

    .toolbar-group {
      display: flex;
      gap: 4px;
      padding: 0 8px;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toolbar-group:last-child {
      border-right: none;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .tool-btn.active {
      background: #0d6efd;
    }

    .tool-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* 颜色选择器 */
    .color-picker {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .color-btn {
      width: 24px;
      height: 24px;
      border: 2px solid transparent;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-btn:hover {
      transform: scale(1.1);
    }

    .color-btn.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
    }

    /* 线条粗细 */
    .line-width {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .width-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .width-btn.active {
      background: rgba(255, 255, 255, 0.2);
    }

    .width-line {
      background: #fff;
      border-radius: 1px;
    }

    /* 操作按钮 */
    .action-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn.cancel {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .action-btn.cancel:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .action-btn.save {
      background: #0d6efd;
      color: #fff;
    }

    .action-btn.save:hover {
      background: #0b5ed7;
    }

    /* 尺寸提示 */
    .size-tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      z-index: 1001;
      display: none;
    }

    /* 放大镜 */
    .magnifier {
      position: fixed;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #0d6efd;
      overflow: hidden;
      pointer-events: none;
      z-index: 1002;
      display: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .magnifier canvas {
      width: 100%;
      height: 100%;
    }

    /* 十字线 */
    .crosshair {
      position: absolute;
      pointer-events: none;
    }

    .crosshair-h {
      width: 100%;
      height: 1px;
      background: rgba(255, 0, 0, 0.5);
      top: 50%;
      left: 0;
    }

    .crosshair-v {
      width: 1px;
      height: 100%;
      background: rgba(255, 0, 0, 0.5);
      left: 50%;
      top: 0;
    }

    /* 信息提示 */
    .info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
    }

    .info-panel kbd {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 信息面板 -->
    <div class="info-panel">
      <div><kbd>ESC</kbd> 取消</div>
      <div><kbd>Enter</kbd> 完成</div>
      <div>拖拽选择区域，或直接使用工具标注</div>
    </div>

    <!-- 画布容器 -->
    <div class="canvas-container" id="canvas-container">
      <canvas id="bg-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>

    <!-- 尺寸提示 -->
    <div class="size-tooltip" id="size-tooltip"></div>

    <!-- 放大镜 -->
    <div class="magnifier" id="magnifier">
      <canvas id="magnifier-canvas"></canvas>
      <div class="crosshair">
        <div class="crosshair-h"></div>
        <div class="crosshair-v"></div>
      </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <!-- 选择工具 -->
      <div class="toolbar-group">
        <button class="tool-btn active" data-tool="select" title="选择 (V)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path>
          </svg>
        </button>
      </div>

      <!-- 形状工具 -->
      <div class="toolbar-group">
        <button class="tool-btn" data-tool="rectangle" title="矩形 (R)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          </svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="圆形 (C)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"></circle>
          </svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="箭头 (A)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
        <button class="tool-btn" data-tool="line" title="直线 (L)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="19" x2="19" y2="5"></line>
          </svg>
        </button>
        <button class="tool-btn" data-tool="brush" title="画笔 (B)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
          </svg>
        </button>
        <button class="tool-btn" data-tool="text" title="文字 (T)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7"></polyline>
            <line x1="9" y1="20" x2="15" y2="20"></line>
            <line x1="12" y1="4" x2="12" y2="20"></line>
          </svg>
        </button>
      </div>

      <!-- 马赛克/模糊 -->
      <div class="toolbar-group">
        <button class="tool-btn" data-tool="mosaic" title="马赛克 (M)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
          </svg>
        </button>
        <button class="tool-btn" data-tool="blur" title="模糊 (U)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 3v18"></path>
            <path d="M3 12h18"></path>
          </svg>
        </button>
      </div>

      <!-- 颜色选择 -->
      <div class="toolbar-group">
        <div class="color-picker" id="color-picker">
          <div class="color-btn active" data-color="#ff0000" style="background: #ff0000"></div>
          <div class="color-btn" data-color="#00ff00" style="background: #00ff00"></div>
          <div class="color-btn" data-color="#0000ff" style="background: #0000ff"></div>
          <div class="color-btn" data-color="#ffff00" style="background: #ffff00"></div>
          <div class="color-btn" data-color="#ffffff" style="background: #ffffff"></div>
          <div class="color-btn" data-color="#000000" style="background: #000000"></div>
        </div>
      </div>

      <!-- 线条粗细 -->
      <div class="toolbar-group">
        <div class="line-width" id="line-width">
          <button class="width-btn active" data-width="2">
            <div class="width-line" style="width: 20px; height: 2px"></div>
          </button>
          <button class="width-btn" data-width="4">
            <div class="width-line" style="width: 20px; height: 4px"></div>
          </button>
          <button class="width-btn" data-width="6">
            <div class="width-line" style="width: 20px; height: 6px"></div>
          </button>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="toolbar-group">
        <button class="action-btn cancel" id="btn-cancel">取消</button>
        <button class="action-btn save" id="btn-save">完成</button>
      </div>
    </div>
  </div>

  <script type="module" src="./screenshot-editor/main.ts"></script>
</body>
</html>
